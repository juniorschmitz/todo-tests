# ─────────────────────────────────────────────────────────────────────────────
# FILE DESTINATION: this workflow belongs in the TESTS repo (todo-tests).
# Move it there when you split the monorepo.
# ─────────────────────────────────────────────────────────────────────────────

name: Triage — test-automation-buddy

on:
  workflow_run:
    workflows: [CI — Playwright Tests]
    types: [completed]

jobs:
  triage:
    if: github.event.workflow_run.conclusion == 'failure'
    # Delegates all triage logic to the reusable workflow in the agent repo.
    # This file never needs to change when agent skills are updated.
    uses: juniorschmitz/test-automation-buddy/.github/workflows/triage-reusable.yml@main
    with:
      artifacts-run-id: ${{ github.event.workflow_run.id }}
      artifacts-repo:   juniorschmitz/todo-tests
      webapp-repo:      juniorschmitz/todo-webapp
      tests-repo:       juniorschmitz/todo-tests
      workflow-run-url: ${{ github.event.workflow_run.html_url }}
    secrets:
      # PAT with issues:write on todo-webapp and todo-tests, and actions:read on todo-tests.
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
