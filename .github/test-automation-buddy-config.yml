# Local config for the test-automation-buddy-playground monorepo.
#
# This config sits at the repo root and is discovered automatically by the
# tab-load-config skill. It's deliberately set to dry-run because the
# playground is for local iteration, not for creating real GitHub issues.
#
# To go live (real `gh` calls), either:
#   - edit `mode: live` below and set repos.* to real `owner/repo` strings, or
#   - override via env: `SELF_HEALING_MODE=live WEBAPP_REPO=... TESTS_REPO=...`

mode: live

repos:
  tests: juniorschmitz/todo-tests
  webapp: juniorschmitz/todo-webapp

classification:
  min_confidence_for_autofix: 0.6
  min_confidence_for_flaky_autofix: 0.7

labels:
  auto_fix: tab-fix
  flaky: flaky
  investigate: needs-investigation
  app_bug: bug,auto-detected

webapp_history:
  # In the playground, "recent PRs" don't really exist (you're running
  # everything locally). The tab-investigate-webapp skill should detect
  # the dry-run/playground mode and fall back to reading the
  # `webapp/CHANGELOG.local.md` file (see that file for the rationale).
  max_prs: 10
  max_commits: 10
  max_diff_fetches: 3

features:
  parse_trace_zip: false
  post_audit_comment: false

  playground_mode: false
